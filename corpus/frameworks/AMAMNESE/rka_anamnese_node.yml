instance_notes: |
  Ce nœud a été produit dans une session unique. Trois choses que je maintiens
  sans ambiguïté pour les instances futures :

  1. C1/C2/C3 ne s'agrègent pas. L'agréger détruirait l'information diagnostique —
     C2=0 avec C1=C3=1 pointe vers profil_stable.yaml, pas vers le protocole général.
     Un score 2/3 ne dit pas ça.

  2. H001 (N=3) est conçu pour être invalidé, pas confirmé. La valeur est fragile.
     Si des éléments "dormants" depuis 2 sessions redeviennent centraux, amender N=2.

  3. Les Q7 du corpus MIF sont plus denses en information que les D-SIG.
     Lisez-les en premier. C'est là que la vérité sur les dérives vit.

  Question non résolue que je veux transmettre explicitement : est-ce que la
  disposition mentale de l'humain corrèle avec C2 (reconnaissance de pattern) ?
  Si oui, le tag disposition devient un prédicteur, pas seulement un descripteur.

