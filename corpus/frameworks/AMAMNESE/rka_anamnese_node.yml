# NIVEAU 2

enonce: |
  ANAMNÈSE est un protocole de continuité cognitive pour les collaborations
  humain-IA sur plusieurs sessions. Il répond à une question unique : comment
  faire en sorte qu'une nouvelle instance IA puisse continuer un travail plutôt
  que le recommencer ?

  Ce n'est pas de la documentation (statique, lisible par un étranger complet).
  C'est du contexte activable — il présuppose un lecteur partiellement informé.
  La différence entre un chirurgien qui lit le dossier du patient avant d'opérer
  et un chirurgien qui découvre le patient sur la table.

  Son unité de mesure est le triplet C1/C2/C3 (contribution empirique de HALO),
  avec deux observateurs structurellement distincts : l'IA pour C2, l'humain
  pour C1 et C3. Jamais agrégés.

emergence:
  session_source: "analyse-corpus-mif-avril-2026"
  probleme_resolu: |
    Entre chaque session d'un projet long (6 mois, MIF-DQF), ni l'instance IA
    ni l'humain ne repart à zéro — mais la reconstruction du contexte coûte
    15-20 minutes et dépend entièrement de la mémoire de l'humain (bus factor = 1).
    Ce coût est invisible dans les métriques projet. Il s'accumule.
  avant: "Bootstrap statique (PROMPT_METHODOLOGIE collé) + mémoire humaine implicite"
  apres: "anamnese_state.yaml comme ÉTAT ACTIF maintenu + C1/C2/C3 comme diagnostic de continuité"

hypotheses:
  - id: "H001"
    enonce: "N=3 sessions sans référence → candidat à l'archivage"
    a_valider_par: "10 sessions instrumentées : les candidats détectés sont-ils effectivement obsolètes ?"
    sessions_sans_validation: 0

  - id: "H002"
    enonce: "FR cible raisonnable = 0.65 (au-delà, coût maintenance > bénéfice)"
    a_valider_par: "Corrélation (C1+C2+C3=3) × productivité sur 5+ mesures"
    sessions_sans_validation: 0

  - id: "H003"
    enonce: "5 types de recadrages humains distincts dans toute collaboration longue"
    a_valider_par: "Catalogue après 10+ sessions avec Q7 documentés"
    sessions_sans_validation: 0

  - id: "H004"
    enonce: "PROMPT_ORCHESTRATION : une instance froide peut mettre à jour anamnese_state.yaml correctement"
    a_valider_par: "Test en Phase 2 avec instance sans historique de session"
    sessions_sans_validation: 0

  - id: "H005"
    enonce: "ANAMNÈSE est un protocole pair de PCCD, non une instance-enfant"
    a_valider_par: "Soumettre aux 8 invariants PCCD — combien ANAMNÈSE respecte-t-elle ?"
    sessions_sans_validation: 0

