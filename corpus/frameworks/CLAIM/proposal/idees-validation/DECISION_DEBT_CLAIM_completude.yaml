questions_ouvertes:
  - id: QO-BR-01
    question: >
      La regle de retrocompatibilite §8 (PENDING_REVIEW + decision operateur)
      est-elle tenable sous forte charge lors d'un changement de Theta impliquant
      de nombreux CLAIMs ACTIVE simultanement ?
    reponse_provisoire: >
      Limite configurable max_pending_review_per_theta_change. Si depassee,
      orchestrateur emet alerte C-07 et differe le changement (THETA_CHANGE_DEFERRED)
      jusqu'a validation operateur.
    bloque: D-11
    difficulte: faible

  - id: QO-BR-02
    question: >
      Le parametre validation_level1_timeout_ms (defaut 50 ms) est-il calibre
      sur des architectures embarquees reelles ?
    reponse_provisoire: >
      50 ms est conservateur. Benchmarks VxWorks B-tree RAM : 1-5 ms sous charge
      normale. Marge x10 acceptable NMT 2-3. Ref : Wind River VxWorks Real-Time
      Performance — citeable sans mesure empirique propre.
    bloque: D-02
    difficulte: moyenne

  - id: QO-BR-03
    question: >
      La transition QUARANTINED -> sortie uniquement par decision humaine est-elle
      tenable dans un scenario de reconnexion massive ?
    reponse_provisoire: >
      Procedure QUARANTINE_RELEASE_BATCH avec chain_id_pattern (wildcard prefixe).
      Sortie vers UNREGISTERED (pas REGISTERED) — cycle confiance progressive
      recommence. A archiver dans T-BR-11.
    bloque: D-08
    difficulte: faible

